name: Build Extension

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check and build
        run: npm run build

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "
            const fs = require('fs');
            const src = fs.readFileSync('manifest.config.ts', 'utf8');
            const m = src.match(/version:\s*['\"]([^'\"]+)/);
            m ? m[1] : '0.0.0';
          ")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Package zip
        run: |
          cd dist
          zip -r ../extension-${{ steps.version.outputs.version }}.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          path: extension-*.zip
          archive: false

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: extension-*.zip
          generate_release_notes: true

      - name: Upload to Edge
        if: startsWith(github.ref, 'refs/tags/')
        uses: wdzeng/edge-addon@v2
        with:
          product-id: 2855053b-f2be-427f-86f4-9ab7339e7d81
          zip-path: extension-*.zip
          api-key: ${{ secrets.EDGE_API_KEY }}
          client-id: ${{ secrets.EDGE_CLIENT_ID }}
